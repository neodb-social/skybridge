services:
  skybridge:
    build: .
    image: neodb/skybridge:latest
    restart: unless-stopped
    ports:
      # host port from .env's SKYBRIDGE_PORT (the app always listens on 8000
      # inside the container)
      - "${SKYBRIDGE_PORT:-8000}:8000"
    env_file:
      - path: .env # cp .env.example .env and edit
        required: false
    volumes:
      # host folder from .env's SKYBRIDGE_DATA (default ./data next to this file)
      - ${SKYBRIDGE_DATA:-./data}:/data
    environment:
      # inside the container the data dir is always the mount point above;
      # env_file's SKYBRIDGE_DATA only picks the host-side folder
      SKYBRIDGE_DATA: /data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/stats', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
