<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>{% block title %}Skybridge{% endblock %}</title>
        {% block head %}{% endblock %}
        <style>
            :root {
                color-scheme: light dark;
            }
            body {
                font-family: system-ui, sans-serif;
                max-width: 60rem;
                margin: 0 auto;
                padding: 1.5rem;
                line-height: 1.5;
            }
            header {
                display: flex;
                gap: 1rem;
                align-items: baseline;
                flex-wrap: wrap;
                border-bottom: 1px solid #8884;
                padding-bottom: 0.75rem;
                margin-bottom: 1rem;
            }
            header h1 {
                margin: 0;
                font-size: 1.4rem;
            }
            nav a {
                margin-right: 1rem;
            }
            .grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(9rem, 1fr));
                gap: 0.75rem;
                margin: 1rem 0;
            }
            .card {
                border: 1px solid #8884;
                border-radius: 0.6rem;
                padding: 0.8rem;
            }
            .card .n {
                font-size: 1.8rem;
                font-weight: 700;
            }
            .card .l {
                color: #888;
                font-size: 0.85rem;
            }
            table {
                width: 100%;
                border-collapse: collapse;
            }
            th,
            td {
                text-align: left;
                padding: 0.4rem 0.5rem;
                border-bottom: 1px solid #8883;
                vertical-align: top;
                font-size: 0.9rem;
            }
            code,
            pre {
                background: #8881;
                border-radius: 0.3rem;
                padding: 0.1rem 0.3rem;
            }
            pre {
                padding: 0.8rem;
                overflow-x: auto;
            }
            .pill {
                font-size: 0.75rem;
                padding: 0.1rem 0.5rem;
                border-radius: 1rem;
                background: #8882;
            }
            .two {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 1rem;
            }
            @media (max-width: 40rem) {
                .two {
                    grid-template-columns: 1fr;
                }
            }
            .muted {
                color: #888;
            }
            .hero {
                display: flex;
                gap: 1.25rem;
                align-items: flex-start;
                margin: 1.5rem 0;
            }
            .hero h2 {
                margin: 0 0 0.25rem;
            }
            .avatar,
            .avatar-fallback {
                width: 6rem;
                height: 6rem;
                border-radius: 50%;
                border: 1px solid #8884;
                flex-shrink: 0;
            }
            .avatar {
                object-fit: cover;
            }
            .avatar-fallback {
                display: flex;
                align-items: center;
                justify-content: center;
                background: #8882;
                font-size: 2.5rem;
                font-weight: 700;
                color: #888;
            }
            .poster,
            .poster-fallback {
                width: 10rem;
                border-radius: 0.6rem;
                border: 1px solid #8884;
                flex-shrink: 0;
            }
            .poster-fallback {
                aspect-ratio: 2 / 3;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #8881;
                color: #888;
            }
        </style>
    </head>
    <body>
        <header>
            <h1><a href="/" style="text-decoration: none">🌁 skybridge</a></h1>
            <nav>
                <a href="/archive">Recent</a>
                <a href="/catalog">Catalog</a>
                <a href="/optout">Manage</a>
            </nav>
        </header>
        {% block content %}{% endblock %}
    </body>
</html>
